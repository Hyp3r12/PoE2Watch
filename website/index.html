<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PoE2Watch</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #0b0f14;
            color: #f4f4f5;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 24px;
        }

        .card {
            max-width: 720px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 1.2rem;
            color: #cbd5e1;
            line-height: 1.6;
        }

        .tagline {
            color: #facc15;
            font-weight: bold;
        }

        a {
            color: #38bdf8;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>PoE2Watch</h1>
        <p class="tagline">Log in with a plan.</p>
        <p>
            PoE2Watch is a Discord companion for Path of Exile 2 that helps players
            track completed sales, receive trade notifications, and view personal
            trade summaries.
        </p>
        <p>
            Currently in early development while we explore official OAuth/API support.
        </p>
        <p>
            <a href="https://github.com/Hyp3r12/PoE2Watch">View on GitHub</a>
        </p>
    </main>
</body>
</html>
